<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENATI - Acceso al Simulador</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .auth-tab {
            flex: 1;
            min-width: 100px;
            padding: 0.7rem;
            border: none;
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .auth-tab:hover {
            background: rgba(37, 99, 235, 0.15);
        }
        .auth-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .password-strength {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            padding: 0.5rem;
            border-radius: 4px;
            display: none;
        }
        .strength-weak { background: rgba(220, 38, 38, 0.2); color: var(--danger); }
        .strength-medium { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .strength-strong { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .requirements {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            list-style: none;
            color: var(--text-muted);
        }
        .requirements li { margin: 0.2rem 0; }
        .requirements li.met { color: var(--success); }
        .requirements li:before { content: "☐ "; margin-right: 0.3rem; }
        .requirements li.met:before { content: "✓ "; }
        .admin-grid {
            display: grid;
            gap: 1rem;
            margin-top: 1rem;
        }
        .user-item {
            background: rgba(148, 163, 184, 0.1);
            padding: 0.8rem;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .danger-btn {
            background: var(--danger);
            color: white;
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .danger-btn:hover {
            background: #b91c1c;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
    </style>
</head>
<body>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass-card" style="width: 100%; max-width: 500px;">
            <div class="text-center mb-4">
                <h1 style="font-size: 2rem; font-weight: 700; color: var(--primary);">SENATI EXAMEN</h1>
                <p style="color: var(--text-muted);">Simulador Oficial Multicanal</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-mode="login">🔐 Iniciar</button>
                <button class="auth-tab" data-mode="register">📝 Registrarse</button>
                <button class="auth-tab" data-mode="import">⬆️ Importar</button>
                <button class="auth-tab" data-mode="admin">⚙️ Admin</button>
            </div>

            <form id="auth-form">
                <!-- El contenido se inyecta dinámicamente desde app.js -->
            </form>

            <p class="text-center mt-4" style="font-size: 0.75rem; color: var(--text-muted);">
                🔒 Sistema protegido con cuentas portables y exportación de datos. Tus datos, tu dispositivo.
            </p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
